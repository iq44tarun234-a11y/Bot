<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
    /* CRITICAL FIXES FOR FULL FLUSH FIT & CENTERING */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%; /* Use 100% of the viewport/canvas */
        height: 100%; /* Use 100% of the viewport/canvas */
        display: flex;
        justify-content: center; /* Horizontally center the card contents */
        align-items: center; /* Vertically center the card contents */
        background: #2c2f33; /* Make the canvas background match the card background */
        overflow: hidden; /* Absolutely ensure no scrollbars/whitespace bleed */
    }

    .card {
        /* The card must now expand to fill the available space, 
           or be sized to precisely match the capture area. 
           We will use percentages and max-sizing for flexibility,
           but if your bot takes an 800x250 shot, this fills it perfectly. */
        width: 100vw; /* Viewport width */
        height: 100vh; /* Viewport height */
        max-width: 800px; /* Maximum desired size */
        max-height: 250px; /* Maximum desired size */
        
        background: #2c2f33; /* Dark background */
        border-radius: 20px; /* Keep the rounded look */
        display: flex;
        align-items: center;
        padding: 0 40px; /* Clean padding */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        position: relative; /* Needed for absolute positioning of children */
        overflow: hidden;
        box-sizing: border-box; /* Crucial for padding/border calculation */
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Adds depth */
    }

    /* The Slanted Teal Block */
    .right-decoration {
        position: absolute;
        right: 0;
        top: 0;
        width: 25%; /* Responsive width */
        height: 100%;
        background: #2ec4b6;
        /* Adjusted polygon for a sharper slant */
        clip-path: polygon(35% 0%, 100% 0%, 100% 100%, 0% 100%);
        z-index: 1; /* Lowest layer */
    }

    .avatar-container {
        position: relative;
        z-index: 2; /* Layer above decoration */
        margin-right: 30px;
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid #fff; /* White border for contrast */
        object-fit: cover;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .info {
        flex: 1; /* Occupies the remaining space */
        z-index: 2; /* Layer above decoration */
        max-width: 55%; /* Prevents text collision with teal block */
    }

    .name {
        font-size: 34px;
        font-weight: 800; /* Extra bold */
        margin-bottom: 2px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .tier {
        font-size: 16px;
        color: #fff;
        font-weight: 600;
        opacity: 0.9;
    }

    .aura {
        font-size: 16px;
        margin-top: 4px;
        color: #2ec4b6; /* Teal accent text */
        font-weight: bold;
    }

    /* The Progress Bar */
    .bar-container {
        margin-top: 25px;
        width: 100%;
        height: 14px;
        background: #111; /* Dark track */
        border-radius: 12px;
        overflow: hidden;
        position: relative;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .fill {
        height: 100%;
        background: #2ec4b6; /* Teal fill */
        border-radius: 12px;
        width: 0%; /* Start empty, filled by JS */
        transition: width 0.6s ease-out; /* Smooth fill animation */
    }
</style>
</head>
<body>

<div class="card">
    <div class="avatar-container">
        <img class="avatar" id="avatar" src="https://via.placeholder.com/100" alt="Avatar">
    </div>

    <div class="info">
        <div class="name" id="name">tarun_fx</div>
        <div class="tier" id="tier">Tier: Charge I ⚡⚡</div>
        <div class="aura" id="aura">Aura: 304</div>

        <div class="bar-container">
            <div class="fill" id="progress"></div>
        </div>
    </div>

    <div class="right-decoration"></div>
</div>

<script>
    // Example: Dynamically set progress to 75%
    // In your bot, you would replace '75' with your real value.
    setTimeout(() => {
        document.getElementById("progress").style.width = "75%";
    }, 500); // 0.5s delay for effect
</script>

</body>
</html>
