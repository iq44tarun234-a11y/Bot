<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 800px;
    height: 250px;
    overflow: hidden;
    background: transparent;
}

.card {
    width: 800px;
    height: 250px;
    background: #2c2f33;
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 20px;
    font-family: Arial;
    color: white;
    position: relative;
    overflow: hidden;
}

.right {
    position: absolute;
    right: 0;
    top: 0;
    width: 150px;
    height: 100%;
    background: #2ec4b6;
    clip-path: polygon(40% 0, 100% 0, 100% 100%, 0% 100%);
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    margin-right: 20px;
}

.info {
    flex: 1;
}

.name {
    font-size: 24px;
    font-weight: bold;
}

.tier {
    font-size: 14px;
    opacity: 0.7;
}

.aura {
    font-size: 14px;
    margin-top: 5px;
}

.bar {
    margin-top: 15px;
    width: 100%;
    height: 15px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #2ec4b6;
    width: 0%;
}
</style>
</head>

<body>

<div class="card">
    <img class="avatar" id="avatar">

    <div class="info">
        <div class="name" id="name"></div>
        <div class="tier" id="tier"></div>
        <div class="aura" id="aura"></div>

        <div class="bar">
            <div class="fill" id="progress"></div>
        </div>
    </div>

    <div class="right"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("name").innerText = params.get("name");
document.getElementById("tier").innerText = "Tier: " + params.get("tier");
document.getElementById("aura").innerText = "Aura: " + params.get("aura");
document.getElementById("avatar").src = params.get("avatar");

let progress = params.get("progress");
document.getElementById("progress").style.width = progress + "%";
</script>

</body>
</html>
