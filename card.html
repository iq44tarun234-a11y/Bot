<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

.card {
    width: 800px;
    height: 220px;
    background: #2c2f33;
    border-radius: 15px;
    display: flex;
    overflow: hidden;
}

.left {
    flex: 1;
    padding: 20px;
    color: white;
}

.right {
    width: 200px;
    background: #2aa9a9;
    clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%);
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    float: left;
    margin-right: 15px;
}

.name {
    font-size: 22px;
    margin-top: 10px;
}

.stats {
    margin-top: 5px;
    color: #ccc;
}

.bar {
    margin-top: 25px;
    width: 100%;
    height: 18px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #2aa9a9;
    width: 0%;
}
</style>
</head>

<body>
<div class="card">
    <div class="left">
        <img id="avatar" class="avatar">
        
        <div class="name" id="name"></div>
        <div class="stats" id="tier"></div>
        <div class="stats" id="aura"></div>

        <div class="bar">
            <div class="fill" id="fill"></div>
        </div>
    </div>

    <div class="right"></div>
</div>

<script>
const p = new URLSearchParams(window.location.search);

document.getElementById("name").innerText = p.get("name");
document.getElementById("tier").innerText = "Tier: " + p.get("tier");
document.getElementById("aura").innerText = "Aura: " + p.get("aura");
document.getElementById("avatar").src = p.get("avatar");

let progress = parseInt(p.get("progress")) || 0;
if (progress > 100) progress = 100;

document.getElementById("fill").style.width = progress + "%";
</script>
</body>
</html>
