<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    /* 1. KILL ALL EXTERNAL SPACING */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        background: #2c2f33; /* Matches the card color exactly */
        overflow: hidden;
        display: flex;
    }

    /* 2. MAKE THE CARD FILL THE ENTIRE SCREEN */
    .card {
        width: 100vw;  /* 100% of the Width */
        height: 100vh; /* 100% of the Height */
        background: #2c2f33;
        display: flex;
        align-items: center;
        padding: 0 5%; /* Using % for padding makes it fit any size */
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        position: relative;
    }

    /* THE TEAL SHAPE */
    .right-decoration {
        position: absolute;
        right: 0;
        top: 0;
        width: 30%; /* Stretches with the screen */
        height: 100%;
        background: #2ec4b6;
        clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
        z-index: 1;
    }

    .avatar {
        width: 120px; /* Slightly bigger for better fit */
        height: 120px;
        border-radius: 50%;
        margin-right: 30px;
        border: 4px solid #fff;
        z-index: 2;
        object-fit: cover;
    }

    .info {
        flex: 1;
        z-index: 2;
        max-width: 55%;
    }

    .name {
        font-size: 42px; /* Increased size */
        font-weight: bold;
        margin-bottom: 5px;
    }

    .tier {
        font-size: 20px;
        color: #2ec4b6;
        font-weight: bold;
    }

    .aura {
        font-size: 18px;
        margin-top: 5px;
        opacity: 0.9;
    }

    /* THE PROGRESS BAR */
    .bar-container {
        margin-top: 25px;
        width: 100%;
        height: 18px;
        background: #111;
        border-radius: 20px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
        background: #2ec4b6;
        width: 0%; 
        border-radius: 20px;
        transition: width 0.5s ease;
    }
</style>
</head>
<body>

<div class="card">
    <img class="avatar" id="avatar" src="https://via.placeholder.com/150">

    <div class="info">
        <div class="name" id="name">tarun_fx</div>
        <div class="tier" id="tier">Tier: Charge I ⚡⚡</div>
        <div class="aura" id="aura">Aura: 304</div>

        <div class="bar-container">
            <div class="fill" id="progress"></div>
        </div>
    </div>

    <div class="right-decoration"></div>
</div>

<script>
    // URL Parameter logic
    const params = new URLSearchParams(window.location.search);
    if(params.get("name")) document.getElementById("name").innerText = params.get("name");
    if(params.get("tier")) document.getElementById("tier").innerText = "Tier: " + params.get("tier");
    if(params.get("aura")) document.getElementById("aura").innerText = "Aura: " + params.get("aura");
    if(params.get("avatar")) document.getElementById("avatar").src = params.get("avatar");
    
    // Set width (default 65% if no param)
    let p = params.get("progress") || "65";
    document.getElementById("progress").style.width = p + "%";
</script>

</body>
</html>
