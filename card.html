<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    /* 1. REMOVE ALL WHITE SPACE AROUND THE EDGE */
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 800px;  /* Set this to your exact desired image width */
        height: 250px; /* Set this to your exact desired image height */
        background: transparent; /* No white background */
        overflow: hidden;
        display: block; /* Ensure it's not trying to center in a larger empty space */
    }

    /* 2. MAKE THE CARD FILL THE ENTIRE 800x250 AREA */
    .card {
        width: 800px;
        height: 250px;
        background: #2c2f33;
        display: flex;
        align-items: center;
        padding: 0 40px;
        font-family: 'Arial', sans-serif;
        color: white;
        position: relative;
        overflow: hidden;
    }

    /* THE TEAL SHAPE ON THE RIGHT */
    .right-decoration {
        position: absolute;
        right: 0;
        top: 0;
        width: 200px;
        height: 100%;
        background: #2ec4b6;
        clip-path: polygon(30% 0%, 100% 0%, 100% 100%, 0% 100%);
        z-index: 1;
    }

    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-right: 30px;
        border: 4px solid #fff;
        z-index: 2;
        object-fit: cover;
    }

    .info {
        flex: 1;
        z-index: 2;
    }

    .name {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 5px;
    }

    .tier {
        font-size: 18px;
        color: #2ec4b6;
        font-weight: bold;
    }

    .aura {
        font-size: 16px;
        margin-top: 5px;
        opacity: 0.8;
    }

    /* THE PROGRESS BAR */
    .bar-container {
        margin-top: 20px;
        width: 100%;
        height: 15px;
        background: #111;
        border-radius: 10px;
        overflow: hidden;
    }

    .fill {
        height: 100%;
        background: #2ec4b6;
        width: 0%; /* JS will change this */
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="card">
    <img class="avatar" id="avatar" src="https://via.placeholder.com/100">

    <div class="info">
        <div class="name" id="name">tarun_fx</div>
        <div class="tier" id="tier">Tier: Charge I ⚡⚡</div>
        <div class="aura" id="aura">Aura: 304</div>

        <div class="bar-container">
            <div class="fill" id="progress"></div>
        </div>
    </div>

    <div class="right-decoration"></div>
</div>

<script>
    // Get data from URL
    const params = new URLSearchParams(window.location.search);
    
    if(params.get("name")) document.getElementById("name").innerText = params.get("name");
    if(params.get("tier")) document.getElementById("tier").innerText = "Tier: " + params.get("tier");
    if(params.get("aura")) document.getElementById("aura").innerText = "Aura: " + params.get("aura");
    if(params.get("avatar")) document.getElementById("avatar").src = params.get("avatar");
    
    // Set progress width
    let progress = params.get("progress") || "65"; 
    document.getElementById("progress").style.width = progress + "%";
</script>

</body>
</html>
